<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control Center | Metricwin</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* ── Admin-specific design tokens (inherits from styles.css) ─────────── */
        body {
            overflow: auto;
            height: 100vh;
            background: var(--bg-base);
        }

        .admin-layout {
            display: grid;
            grid-template-columns: 220px 1fr;
            height: 100vh;
            background: var(--bg-base);
        }

        /* ── Sidebar ─────────────────────────────────────────────────── */
        .admin-sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
        }

        .admin-sidebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 8px 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 8px;
        }

        .admin-sidebar-brand .brand-icon { font-size: 1.4rem; }

        .admin-sidebar-brand span {
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .admin-nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .admin-nav-btn {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            text-align: left;
            color: var(--text-secondary);
            background: transparent;
            font-weight: 600;
            font-size: 0.85rem;
            border: 1px solid transparent;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-nav-btn:hover:not(.active) {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border-color: var(--border);
        }

        .admin-nav-btn.active {
            background: var(--accent-dim);
            color: var(--accent);
            border-color: var(--accent-border);
        }

        /* ── Main ────────────────────────────────────────────────────── */
        .admin-main {
            padding: 32px 36px;
            overflow-y: auto;
            background: var(--bg-base);
        }

        .admin-page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .admin-page-header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .admin-page-header p {
            font-size: 0.83rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ── Stat Grid ──────────────────────────────────────────────── */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: var(--radius-md);
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,45,85,0.4), transparent);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .stat-card:hover {
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: var(--shadow-md);
        }

        .stat-card:hover::before { opacity: 1; }

        .stat-card.highlight {
            border-color: rgba(34, 197, 94, 0.25);
            background: rgba(34, 197, 94, 0.04);
        }

        .stat-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .stat-value {
            font-size: 1.7rem;
            font-weight: 900;
            color: var(--text-primary);
            margin-top: 8px;
            letter-spacing: -0.5px;
            font-family: var(--font-mono, monospace);
        }

        .stat-value.green { color: var(--success); }
        .stat-value.red   { color: var(--error); }
        .stat-value.blue  { color: var(--blue); }

        /* ── Section Card ─────────────────────────────────────────────── */
        .section-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-bottom: 24px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.015);
        }

        .section-header h2 {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .section-header span {
            font-size: 0.72rem;
            color: var(--text-muted);
        }

        /* ── Data Table ──────────────────────────────────────────────── */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th, .data-table td {
            padding: 13px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .data-table th {
            background: rgba(255,255,255,0.02);
            font-size: 0.70rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 700;
        }

        .data-table td {
            font-size: 0.84rem;
            color: var(--text-secondary);
        }

        .data-table tr:last-child td { border-bottom: none; }

        .data-table tr:hover td {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .data-table td strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* ── Status Pills ─────────────────────────────────────────────── */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: var(--radius-full);
            font-size: 0.70rem;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .status-pill::before {
            content: '';
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: currentColor;
        }

        .status-pending  { background: var(--warning-dim); color: var(--warning); border: 1px solid var(--warning-border); }
        .status-approved { background: var(--success-dim); color: var(--success); border: 1px solid var(--success-border); }
        .status-rejected { background: var(--error-dim);   color: var(--error);   border: 1px solid var(--error-border); }

        /* Action Buttons in Table */
        .action-btn {
            padding: 5px 12px;
            border-radius: var(--radius-xs);
            font-size: 0.72rem;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition-fast);
            border: 1px solid;
        }

        .action-btn.approve {
            background: var(--success-dim);
            color: var(--success);
            border-color: var(--success-border);
        }

        .action-btn.approve:hover {
            background: var(--success);
            color: #fff;
        }

        .action-btn.reject {
            background: var(--error-dim);
            color: var(--error);
            border-color: var(--error-border);
        }

        .action-btn.reject:hover {
            background: var(--error);
            color: #fff;
        }

        /* Back button */
        .back-btn {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 18px;
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            width: auto;
        }

        .back-btn:hover {
            border-color: rgba(255,255,255,0.18);
            color: var(--text-primary);
        }
    </style>
</head>
<body class="admin-layout">

    <aside class="admin-sidebar">
        <div class="admin-sidebar-brand">
            <span class="brand-icon">✈️</span>
            <span>Admin Panel</span>
        </div>
        <nav class="admin-nav">
            <button class="admin-nav-btn active">📊 Dashboard</button>
            <button class="admin-nav-btn">👥 Players</button>
            <button class="admin-nav-btn">💸 Withdrawals</button>
            <button class="admin-nav-btn">🎮 Game Control</button>
            <button class="admin-nav-btn">⚙️ Settings</button>
        </nav>
    </aside>

    <main class="admin-main">
        <div class="admin-page-header">
            <div>
                <h1>Executive Overview</h1>
                <p>Real-time platform metrics and controls</p>
            </div>
            <button class="back-btn" onclick="window.location.href='/'">← Back to Game</button>
        </div>

        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-label">Total GGR</div>
                <div class="stat-value green">KES 1.2M</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Users</div>
                <div class="stat-value blue" id="activeUsersCount">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Pending Payouts</div>
                <div class="stat-value" id="pendingPayoutsCount">0</div>
            </div>
            <div class="stat-card highlight">
                <div class="stat-label">24h Deposits</div>
                <div class="stat-value green">KES 84K</div>
            </div>
        </div>

        <div class="section-card">
            <div class="section-header">
                <h2>Pending Withdrawals</h2>
                <span>Awaiting review</span>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Player</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="pendingWithdrawalList">
                    <!-- Rows Dynamic -->
                </tbody>
            </table>
        </div>
    </main>

    <script type="module" src="src/admin.js"></script>
</body>
</html>
