<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control Center | Metricwin</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-layout {
            display: grid;
            grid-template-columns: 240px 1fr;
            height: 100vh;
            background: #030005;
        }
        .admin-sidebar {
            background: #0d001a;
            border-right: 1px solid var(--glass-border);
            padding: 24px;
        }
        .admin-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .admin-nav-btn {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            text-align: left;
            color: var(--text-secondary);
            background: transparent;
            font-weight: 600;
        }
        .admin-nav-btn.active {
            background: var(--bg-accent);
            color: #fff;
        }
        .admin-main {
            padding: 40px;
            overflow-y: auto;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: var(--bg-surface-solid);
            border: 1px solid var(--glass-border);
            padding: 24px;
            border-radius: var(--radius-md);
        }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; }
        .stat-value { font-size: 1.8rem; font-weight: 900; color: #fff; margin-top: 8px; }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-surface-solid);
            border-radius: var(--radius-md);
            overflow: hidden;
        }
        .data-table th, .data-table td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }
        .data-table th {
            background: rgba(255,255,255,0.05);
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        .status-pill {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .status-pending { background: rgba(245, 158, 11, 0.1); color: var(--accent-gold); }
        .status-approved { background: rgba(16, 185, 129, 0.1); color: var(--accent-green); }
        .status-rejected { background: rgba(226, 29, 72, 0.1); color: var(--bg-accent); }
    </style>
</head>
<body class="admin-layout">

    <aside class="admin-sidebar">
        <div class="topbar-brand" style="margin-bottom: 40px;">
            <span class="brand-name">ADMIN PANEL</span>
        </div>
        <nav class="admin-nav">
            <button class="admin-nav-btn active">Dashboard</button>
            <button class="admin-nav-btn">Players</button>
            <button class="admin-nav-btn">Withdrawals</button>
            <button class="admin-nav-btn">Game Control</button>
            <button class="admin-nav-btn">Settings</button>
        </nav>
    </aside>

    <main class="admin-main">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
            <h1>Executive Overview</h1>
            <button class="auth-btn" style="width: auto; padding: 10px 24px;" onclick="window.location.href='/'">Back to Game</button>
        </div>

        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-label">Total GGR</div>
                <div class="stat-value">KES 1.2M</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Users</div>
                <div class="stat-value" id="activeUsersCount">Loading...</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Pending Payouts</div>
                <div class="stat-value" id="pendingPayoutsCount">0</div>
            </div>
            <div class="stat-card" style="border-color: var(--accent-green);">
                <div class="stat-label">24h Deposits</div>
                <div class="stat-value">KES 84K</div>
            </div>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 24px;">Pending Withdrawals</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Player</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="pendingWithdrawalList">
                    <!-- Rows Dynamic -->
                </tbody>
            </table>
        </div>
    </main>

    <script type="module" src="src/admin.js"></script>
</body>
</html>
