<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Terminal | Metricwin</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            overflow: auto;
            height: 100vh;
            background: var(--bg-base);
            font-family: var(--font-mono, 'JetBrains Mono', monospace);
        }

        /* ── Terminal Header ──────────────────────────────────────────── */
        .terminal-header {
            padding: 16px 32px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .terminal-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .terminal-brand-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-xs);
            background: var(--accent-dim);
            border: 1px solid var(--accent-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .terminal-brand-text .title {
            font-size: 0.85rem;
            font-weight: 900;
            letter-spacing: 1.5px;
            color: var(--text-primary);
        }

        .terminal-brand-text .subtitle {
            font-size: 0.6rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            margin-top: 1px;
        }

        .security-badge {
            background: var(--error-dim);
            color: var(--error);
            padding: 4px 14px;
            border: 1px solid var(--error-border);
            border-radius: var(--radius-full);
            font-size: 0.65rem;
            font-weight: 900;
            letter-spacing: 1px;
        }

        /* ── Layout ──────────────────────────────────────────────────── */
        .nav-grid {
            display: grid;
            grid-template-columns: 220px 1fr;
            height: calc(100vh - 69px);
        }

        /* ── Sidebar ─────────────────────────────────────────────────── */
        .admin-sidebar {
            background: var(--bg-secondary);
            padding: 20px 14px;
            border-right: 1px solid var(--border);
            overflow-y: auto;
        }

        .sidebar-section-label {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            text-transform: uppercase;
            padding: 0 10px;
            margin-bottom: 8px;
        }

        .tool-btn {
            display: block;
            width: 100%;
            padding: 10px 12px;
            text-align: left;
            background: transparent;
            color: var(--text-secondary);
            margin-bottom: 3px;
            border-radius: var(--radius-sm);
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            border: 1px solid transparent;
        }

        .tool-btn:hover,
        .tool-btn.active {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border-color: var(--border);
        }

        .tool-btn.active {
            color: var(--accent);
            border-color: var(--accent-border);
            background: var(--accent-dim);
        }

        .danger-zone {
            margin-top: 24px;
            padding: 14px;
            border: 1px dashed rgba(239, 68, 68, 0.3);
            border-radius: var(--radius-sm);
            background: var(--error-dim);
        }

        .danger-zone-label {
            font-size: 0.6rem;
            font-weight: 900;
            letter-spacing: 1.5px;
            color: var(--error);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .danger-btn {
            width: 100%;
            padding: 8px 12px;
            border-radius: var(--radius-xs);
            background: var(--error-dim);
            color: var(--error);
            border: 1px solid var(--error-border);
            font-size: 0.72rem;
            font-weight: 800;
            cursor: pointer;
            transition: all var(--transition-fast);
            letter-spacing: 0.5px;
            margin-top: 6px;
        }

        .danger-btn:hover {
            background: var(--error);
            color: #fff;
            border-color: var(--error);
        }

        /* ── Main Pane ───────────────────────────────────────────────── */
        .main-pane {
            padding: 32px;
            overflow-y: auto;
            background: var(--bg-base);
        }

        .pane-header {
            margin-bottom: 24px;
        }

        .pane-header h1 {
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: 0.5px;
            color: var(--text-primary);
        }

        .pane-header p {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 3px;
        }

        /* ── Metric Cards ─────────────────────────────────────────────── */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }

        .metric-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            padding: 18px 20px;
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
        }

        .metric-card:hover {
            border-color: rgba(255,255,255,0.12);
            box-shadow: var(--shadow-md);
        }

        .metric-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .metric-value {
            font-size: 1.8rem;
            font-weight: 900;
            margin-top: 6px;
            font-family: var(--font-mono, monospace);
        }

        .metric-value.stable { color: var(--success); }
        .metric-value.warn   { color: var(--warning); }
        .metric-value.info   { color: var(--blue); }

        /* ── Audit Table ──────────────────────────────────────────────── */
        .section-title {
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 14px;
            padding-top: 4px;
        }

        .audit-table-wrap {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .audit-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.78rem;
        }

        .audit-table th {
            padding: 11px 16px;
            text-align: left;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
        }

        .audit-table td {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-subtle);
            color: var(--text-secondary);
        }

        .audit-table tr:last-child td { border-bottom: none; }

        .audit-table tr:hover td {
            background: var(--bg-elevated);
        }

        .action-tag {
            color: var(--warning);
            font-weight: 700;
        }

        .user-tag {
            color: var(--blue);
            font-weight: 600;
        }

        .time-tag {
            color: var(--text-muted);
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <header class="terminal-header">
        <div class="terminal-brand">
            <div class="terminal-brand-icon">🛡️</div>
            <div class="terminal-brand-text">
                <div class="title">SUPER ADMIN TERMINAL</div>
                <div class="subtitle">METRICWIN · SYSTEM KERNEL V4.2.0</div>
            </div>
        </div>
        <div class="security-badge">PROTOCOL: RESTRICTED LEVEL 5</div>
    </header>

    <div class="nav-grid">
        <aside class="admin-sidebar">
            <div class="sidebar-section-label">Navigation</div>
            <button class="tool-btn active">System Overview</button>
            <button class="tool-btn">User Sovereignty</button>
            <button class="tool-btn">Admin Hierarchy</button>
            <button class="tool-btn">Financial Ledger</button>
            <button class="tool-btn">Audit Records</button>
            <button class="tool-btn">Global Settings</button>

            <div class="danger-zone">
                <div class="danger-zone-label">Critical Actions</div>
                <button class="danger-btn" onclick="toggleMaintenance()">⚠ TOGGLE MAINTENANCE</button>
            </div>
        </aside>

        <main class="main-pane" id="adminContent">
            <div class="pane-header">
                <h1>System Integrity Status</h1>
                <p>Real-time platform health and activity metrics</p>
            </div>

            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">Active Sessions</div>
                    <div class="metric-value info" id="activeSessions">—</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">System Load</div>
                    <div class="metric-value stable">STABLE</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Total GGR</div>
                    <div class="metric-value" id="totalGGR">—</div>
                </div>
            </div>

            <div class="section-title">Recent Audit Trail</div>
            <div class="audit-table-wrap">
                <table class="audit-table">
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>User</th>
                            <th>Action</th>
                            <th>Details</th>
                        </tr>
                    </thead>
                    <tbody id="auditTrail">
                        <!-- Dynamic -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script type="module" src="src/super-admin.js"></script>
</body>
</html>
