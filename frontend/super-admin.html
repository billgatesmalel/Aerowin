<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Terminal | Aviator Elite</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --admin-red: #ff3e3e;
            --admin-gold: #ffd700;
        }
        body { background: #000; color: #fff; font-family: 'JetBrains Mono', monospace; }
        .terminal-header {
            padding: 20px 40px;
            background: #111;
            border-bottom: 2px solid var(--admin-red);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .security-badge {
            background: rgba(255, 62, 62, 0.1);
            color: var(--admin-red);
            padding: 4px 12px;
            border: 1px solid var(--admin-red);
            font-size: 0.7rem;
            font-weight: 900;
        }
        .nav-grid {
            display: grid;
            grid-template-columns: 240px 1fr;
            height: calc(100vh - 84px);
        }
        .admin-sidebar {
            background: #080808;
            padding: 32px;
            border-right: 1px solid #222;
        }
        .tool-btn {
            display: block;
            width: 100%;
            padding: 12px;
            text-align: left;
            background: transparent;
            color: #888;
            margin-bottom: 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .tool-btn:hover, .tool-btn.active {
            background: #1a1a1a;
            color: #fff;
            border-left: 3px solid var(--admin-red);
        }
        .main-pane { padding: 40px; overflow-y: auto; }
        .audit-table {
            width: 100%;
            font-size: 0.8rem;
            border-collapse: collapse;
        }
        .audit-table tr { border-bottom: 1px solid #111; }
        .audit-table td { padding: 8px; }
        .action-tag { color: var(--admin-gold); }
    </style>
</head>
<body>

    <header class="terminal-header">
        <div style="display: flex; align-items: center; gap: 16px;">
            <span style="font-size: 1.5rem;">🚨</span>
            <div>
                <div style="font-weight: 900; letter-spacing: 1px;">SUPER ADMIN TERMINAL</div>
                <div style="font-size: 0.6rem; color: #555;">SYSTEM KERNEL V4.2.0</div>
            </div>
        </div>
        <div class="security-badge">PROTOCOL: RESTRICTED LEVEL 5</div>
    </header>

    <div class="nav-grid">
        <aside class="admin-sidebar">
            <button class="tool-btn active">System Overview</button>
            <button class="tool-btn">User Sovereignty</button>
            <button class="tool-btn">Admin Hierarchy</button>
            <button class="tool-btn">Financial Ledger</button>
            <button class="tool-btn">Audit Records</button>
            <button class="tool-btn">Global Settings</button>
            <div style="margin-top: 40px; padding: 20px; border: 1px dashed #333; font-size: 0.7rem; color: #444;">
                CRITICAL ACTIONS:
                <button class="auth-btn" style="background: var(--admin-red); margin-top: 10px;" onclick="toggleMaintenance()">TOGGLE MAINTENANCE</button>
            </div>
        </aside>

        <main class="main-pane" id="adminContent">
            <h1>System Integrity Status</h1>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 32px;">
                <div class="card">
                    <div style="color: #666; font-size: 0.8rem;">ACTIVE SESSIONS</div>
                    <div style="font-size: 2rem; font-weight: 900;" id="activeSessions">--</div>
                </div>
                <div class="card">
                    <div style="color: #666; font-size: 0.8rem;">SYSTEM LOAD</div>
                    <div style="font-size: 2rem; font-weight: 900; color: #00ff00;">STABLE</div>
                </div>
                <div class="card">
                    <div style="color: #666; font-size: 0.8rem;">TOTAL GGR</div>
                    <div style="font-size: 2rem; font-weight: 900;" id="totalGGR">--</div>
                </div>
            </div>

            <h2 style="margin-top: 60px; margin-bottom: 24px;">Recent Audit Trail</h2>
            <table class="audit-table">
                <tbody id="auditTrail">
                    <!-- Dynamic -->
                </tbody>
            </table>
        </main>
    </div>

    <script type="module" src="src/super-admin.js"></script>
</body>
</html>
